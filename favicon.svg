<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#1a2e14"/>
      <stop offset="100%" stop-color="#050803"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e6e10"/>
      <stop offset="15%" stop-color="#4ab530"/>
      <stop offset="40%" stop-color="#7edc5a"/>
      <stop offset="65%" stop-color="#4ab530"/>
      <stop offset="100%" stop-color="#165a0a"/>
    </linearGradient>
    <radialGradient id="bump1" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#8fe86a"/>
      <stop offset="60%" stop-color="#4aad30"/>
      <stop offset="100%" stop-color="#2d8218"/>
    </radialGradient>
    <radialGradient id="bump2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6bcc46"/>
      <stop offset="100%" stop-color="#237a14"/>
    </radialGradient>
    <radialGradient id="bump3" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#7ee058"/>
      <stop offset="100%" stop-color="#3d9e28"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e0fcd0" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#b8f598" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#b8f598" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <ellipse cx="50" cy="91" rx="15" ry="4" fill="#000" opacity="0.3"/>

  <!-- Irregular pickle body with subtle wavy contour -->
  <path d="M44,4 C38,5 33,14 31,20 C30,26 29,30 30,36 C31,42 32,44 31,50 C30,56 29,60 30,66 C31,72 34,78 36,82 C38,86 42,90 46,92 C50,94 56,92 60,88 C64,84 67,78 68,72 C69,66 69,60 68,54 C67,48 66,44 67,38 C68,32 69,26 68,20 C67,14 62,7 56,4 C52,2 48,2 44,4Z" fill="url(#body)"/>

  <!-- Surface bumps - distributed across the body -->
  <ellipse cx="33" cy="24" rx="3" ry="2.5" fill="url(#bump1)" transform="rotate(-10 33 24)"/>
  <ellipse cx="36" cy="40" rx="3.5" ry="3" fill="url(#bump2)" transform="rotate(5 36 40)"/>
  <ellipse cx="34" cy="56" rx="3" ry="2.5" fill="url(#bump3)" transform="rotate(-5 34 56)"/>
  <ellipse cx="37" cy="72" rx="2.5" ry="3" fill="url(#bump2)" transform="rotate(8 37 72)"/>

  <ellipse cx="66" cy="28" rx="3" ry="2.5" fill="url(#bump1)" transform="rotate(10 66 28)"/>
  <ellipse cx="68" cy="44" rx="3.5" ry="3" fill="url(#bump3)" transform="rotate(-5 68 44)"/>
  <ellipse cx="66" cy="60" rx="3" ry="2.5" fill="url(#bump2)" transform="rotate(5 66 60)"/>

  <!-- Center bumps -->
  <ellipse cx="46" cy="50" rx="2.5" ry="2" fill="url(#bump3)" transform="rotate(-15 46 50)"/>
  <ellipse cx="56" cy="66" rx="2.5" ry="2" fill="url(#bump1)" transform="rotate(12 56 66)"/>
  <ellipse cx="54" cy="32" rx="2" ry="2.5" fill="url(#bump2)" transform="rotate(-8 54 32)"/>

  <!-- Darker dimples/spots for realism -->
  <ellipse cx="40" cy="30" rx="1.5" ry="1" fill="#165a0a" opacity="0.4" transform="rotate(20 40 30)"/>
  <ellipse cx="62" cy="36" rx="1.5" ry="1" fill="#165a0a" opacity="0.35" transform="rotate(-15 62 36)"/>
  <ellipse cx="44" cy="68" rx="1.2" ry="1" fill="#165a0a" opacity="0.3" transform="rotate(10 44 68)"/>
  <ellipse cx="60" cy="74" rx="1.5" ry="1" fill="#165a0a" opacity="0.35" transform="rotate(-20 60 74)"/>
  <ellipse cx="48" cy="20" rx="1.2" ry="1" fill="#165a0a" opacity="0.3"/>

  <!-- Highlight streak -->
  <path d="M43,8 C38,22 36,38 37,54 C38,68 39,80 42,86" fill="none" stroke="url(#shine)" stroke-width="7" stroke-linecap="round"/>

  <!-- Subtle shadow on right side -->
  <path d="M56,6 C62,10 66,20 68,30 C69,40 68,50 67,58 C66,66 63,76 58,84" fill="none" stroke="#0f3306" stroke-width="4" stroke-linecap="round" opacity="0.15"/>

  <!-- Stem -->
  <path d="M47,3 C48,0 50,-2 52,-4 C50,-1 48,2 50,5 C48,5 47,4 47,3Z" fill="#2d6e1a"/>

  <!-- Eyes -->
  <ellipse cx="43" cy="38" rx="2.5" ry="3" fill="#071f02"/>
  <ellipse cx="56" cy="38" rx="2.5" ry="3" fill="#071f02"/>
  <path d="M41,35.5 C43,36 44.5,36 45,35" fill="none" stroke="#071f02" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54,35 C55,36 56.5,36 58.5,35.5" fill="none" stroke="#071f02" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Smirk -->
  <path d="M44,49 C46,51.5 53,52 56,49.5" fill="none" stroke="#071f02" stroke-width="1.8" stroke-linecap="round"/>
</svg>